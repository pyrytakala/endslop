<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranked: AI Engineer talks</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Ranked: AI Engineer talks</h1>
        <p id="meta" class="meta">Loading…</p>
      </div>
    </header>

    <main id="grid" class="grid" aria-live="polite"></main>

    <template id="card-template">
      <article class="card">
        <div class="rank"></div>
        <button type="button" class="score" aria-expanded="false" aria-label="Show score breakdown"></button>
        <div class="score-breakdown" hidden></div>
        <a class="thumb-link" target="_blank" rel="noopener noreferrer">
          <img class="thumb" alt="" loading="lazy" />
        </a>
        <div class="body">
          <div class="talk-heading">
            <a class="title-link" target="_blank" rel="noopener noreferrer"></a>
            <time class="published"></time>
          </div>
          <div class="summary-wrap">
            <div class="summary-panel">
              <ul class="summary"></ul>
              <button type="button" class="summary-toggle summary-more">...more</button>
            </div>
          </div>
        </div>
        <button type="button" class="summary-toggle summary-less" hidden>Show less</button>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
